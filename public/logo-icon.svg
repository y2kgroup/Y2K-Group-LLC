<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="url(#iconGradient)"/>

  <!-- Circuit Pattern -->
  <g fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5">
    <circle cx="20" cy="20" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="80" cy="20" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="20" cy="80" r="3" fill="rgba(255,255,255,0.3)"/>
    <circle cx="80" cy="80" r="3" fill="rgba(255,255,255,0.3)"/>

    <!-- Circuit Lines -->
    <path d="M20 20 L35 20 L40 30 L40 40"/>
    <path d="M80 20 L65 20 L60 30 L60 40"/>
    <path d="M20 80 L35 80 L40 70 L40 60"/>
    <path d="M80 80 L65 80 L60 70 L60 60"/>
  </g>

  <!-- Server Stack Icon -->
  <g fill="white">
    <!-- Server 1 -->
    <rect x="30" y="25" width="40" height="12" rx="3"/>
    <circle cx="35" cy="31" r="2" fill="#0ea5e9"/>
    <circle cx="40" cy="31" r="2" fill="#a855f7"/>

    <!-- Server 2 -->
    <rect x="30" y="40" width="40" height="12" rx="3"/>
    <circle cx="35" cy="46" r="2" fill="#0ea5e9"/>
    <circle cx="40" cy="46" r="2" fill="#a855f7"/>

    <!-- Server 3 -->
    <rect x="30" y="55" width="40" height="12" rx="3"/>
    <circle cx="35" cy="61" r="2" fill="#0ea5e9"/>
    <circle cx="40" cy="61" r="2" fill="#a855f7"/>
  </g>

  <!-- Y2K Text below servers -->
  <text x="50" y="88" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Y2K</text>
</svg>
